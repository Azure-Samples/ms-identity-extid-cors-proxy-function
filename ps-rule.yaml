#
# PSRule configuration
#

# Please see the documentation for all configuration options:
# https://aka.ms/ps-rule/options

requires:
  PSRule: '@pre >=2.8.1'
  PSRule.Rules.Azure: '>=1.40.0'

# Automatically use rules for Azure.
include:
  module:
  - PSRule.Rules.Azure

rule:
  # Enable all rules in the Azure Pillar.
  exclude:
  - Azure.AppService.AvailabilityZone # Not supported in Flex Consumption SKU
  - Azure.AppService.PlanInstanceCount # Not supported in Flex Consumption SKU

input:
  pathIgnore:
  - '**/*'
  - '!infra/main.test.bicep'

configuration:
  # Enable expansion of .bicepparam files.
  AZURE_BICEP_PARAMS_FILE_EXPANSION: true
  AZURE_BICEP_FILE_EXPANSION: true
  AZURE_VNET_SUBNET_EXCLUDED_FROM_NSG: #TODO Add NSGs
  - app
  - private-endpoints-subnet